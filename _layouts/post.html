<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>
    <style>
        body { font-family: sans-serif; max-width: 750px; margin: 0 auto; padding: 30px 20px; line-height: 1.7; background: #fff; color: #2d3748; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #4a5568; text-decoration: none; background: #edf2f7; padding: 6px 12px; border-radius: 6px; }
        h1 { margin-top: 10px; font-size: 2em; color: #1a202c; }
        .meta { color: #718096; font-size: 0.9em; margin-bottom: 30px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; }
        img { max-width: 100%; border-radius: 8px; margin: 20px 0; }
        .video-container { background: #000; border-radius: 8px; overflow: hidden; margin: 25px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        video { width: 100%; display: block; }
        .download-box { background: #ebf8ff; border: 1px solid #bee3f8; padding: 20px; border-radius: 8px; margin: 30px 0; text-align: center; }
        .download-btn { display: inline-block; background: #3182ce; color: white; text-decoration: none; padding: 10px 24px; border-radius: 6px; font-weight: bold; margin-top: 10px; }
        .download-btn:hover { background: #2b6cb0; }
    </style>
</head>
<body>

    <a href="{{ site.baseurl }}/" class="back-btn">⬅️ 返回主页</a>
    <h1>{{ page.title }}</h1>
    <div class="meta">发布日期：{{ page.date | date: "%Y-%m-%d" }}</div>

    <!-- 这里自动长出你写的正文文字和图片 -->
    <div class="content">
        {{ content }}
    </div>

    <!-- 💡 如果你在后台填了视频，这里全自动长出视频播放器 -->
    {% if page.video_url %}
    <h3>📺 视频讲解演示：</h3>
    <div class="video-container">
        <video controls src="{{ page.video_url }}"></video>
    </div>
    {% endif %}

    <!-- 💡 如果你在后台填了下载文件，这里全自动长出下载按钮 -->
    {% if page.download_file %}
    <div class="download-box">
        <h3>📂 课件/配套资料下载</h3>
        <p>本文包含可下载的配套学习资料或表格附件。</p>
        <a href="{{ page.download_file }}" download class="download-btn">📥 点击下载附件资料</a>
    </div>
    {% endif %}

</body>
</html>
